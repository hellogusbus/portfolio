<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatroom - Angus McBryde</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chatroom.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>
<body>
    <header>
        <h1><a href="index.html"><img src="images/logo.webp" alt="Angus McBryde"></a></h1>
        <nav class="menu">
            <a href="index.html">
                <img src="images/icon-work.webp" alt="Work">
            </a>
            <a href="about.html">
                <img src="images/icon-about.webp" alt="About">
            </a>
            <a href="music.html">
                <img src="images/icon-music2.webp" alt="Music">
            </a>
        </nav>
    </header>

    <main class="chatroom-page">
        <h2>Chatroom</h2>
        <p class="chatroom-intro">Welcome to my 00's style chatroom</p>
        
        <div class="chat-container">
            <div id="messages" class="messages-container"></div>
            
            <div class="input-container">
                <input type="text" id="displayName" placeholder="Your name" maxlength="20">
                <input type="text" id="messageInput" placeholder="Type a message..." maxlength="200">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCmsrmQIhYA-ajCwms2vbQj56kLOMcN2OI",
            authDomain: "angusmcbryde-chat.firebaseapp.com",
            databaseURL: "https://angusmcbryde-chat-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "angusmcbryde-chat",
            storageBucket: "angusmcbryde-chat.firebasestorage.app",
            messagingSenderId: "1031427803833",
            appId: "1:1031427803833:web:b00132f5acc6b15956e968"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const messagesRef = ref(database, 'messages');

        // DOM elements
        const messagesContainer = document.getElementById('messages');
        const displayNameInput = document.getElementById('displayName');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Admin mode check (hidden feature)
        let isAdmin = false;
        if (window.location.hash === '#ni8#Ggx3iH4c6aMam@3a') {
            isAdmin = true;
            displayNameInput.value = 'Angus';
            displayNameInput.style.backgroundColor = '#fff3cd';
        }

        // Load saved display name (if not admin)
        if (!isAdmin) {
            const savedName = localStorage.getItem('chatDisplayName');
            if (savedName) {
                displayNameInput.value = savedName;
            }
        }

        // Save display name
        displayNameInput.addEventListener('change', () => {
            if (!isAdmin) {
                localStorage.setItem('chatDisplayName', displayNameInput.value);
            }
        });

        // Send message
        function sendMessage() {
            const name = displayNameInput.value.trim();
            const message = messageInput.value.trim();

            if (!name) {
                alert('Please enter your name');
                displayNameInput.focus();
                return;
            }

            // Prevent using "Angus" (reserved) - unless admin mode
            if (!isAdmin && name.toLowerCase() === 'angus') {
                alert('Hey! That's my name! Choose another.');
                displayNameInput.value = '';
                displayNameInput.focus();
                return;
            }

            if (!message) {
                return;
            }

            // Push message to Firebase
            push(messagesRef, {
                name: name,
                message: message,
                timestamp: serverTimestamp()
            });

            // Clear input
            messageInput.value = '';
        }

        // Listen for new messages
        onChildAdded(messagesRef, (snapshot) => {
            const data = snapshot.val();
            displayMessage(data.name, data.message, data.timestamp);
        });

        // Display message in chat
        function displayMessage(name, message, timestamp) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'message-name';
            nameSpan.textContent = name + ':';

            const textSpan = document.createElement('span');
            textSpan.className = 'message-text';
            textSpan.textContent = message;

            const timeSpan = document.createElement('span');
            timeSpan.className = 'message-time';
            if (timestamp) {
                const date = new Date(timestamp);
                timeSpan.textContent = formatTime(date);
            }

            messageDiv.appendChild(nameSpan);
            messageDiv.appendChild(textSpan);
            messageDiv.appendChild(timeSpan);

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Format timestamp
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
            
            return date.toLocaleDateString();
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
